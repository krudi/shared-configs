name: Release prettier-config

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the package tag prefix"
        required: true
        type: string
      create_latest:
        description: "Mark the GitHub release as latest"
        required: true
        default: true
        type: boolean

concurrency:
  group: release-prettier-config-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
      id-token: write
    uses: krudi/reusable-actions/.github/workflows/release-and-publish.yaml@main
    with:
      version: ${{ inputs.version }}
      publish_target: npm
      create_latest: ${{ inputs.create_latest }}
      working_directory: .
      workspace: "@krudi/prettier-config"
      package_json_path: packages/prettier-config/package.json
      package_lock_path: package-lock.json
      node_version_file: .nvmrc
      tag_prefix: "@krudi/prettier-config@"
      commit_message: "chore(release): bump @krudi/prettier-config from {old} to {new}"
    secrets:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
