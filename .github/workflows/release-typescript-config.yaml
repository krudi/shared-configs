name: Release typescript-config

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the package tag prefix"
        required: true
        type: string
      create_latest:
        description: "Mark the GitHub release as latest"
        required: true
        default: true
        type: boolean

concurrency:
  group: release-typescript-config-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
    uses: krudi/reusable-actions/.github/workflows/create-release.yaml@main
    with:
      version: ${{ inputs.version }}
      create_latest: ${{ inputs.create_latest }}
      working_directory: .
      workspace: "@krudi/typescript-config"
      package_json_path: packages/typescript-config/package.json
      package_lock_path: package-lock.json
      node_version_file: .nvmrc
      tag_prefix: "@krudi/typescript-config@"
      commit_message: "chore(release): bump @krudi/typescript-config from {old} to {new}"
