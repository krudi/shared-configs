name: Typecheck

on:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened

concurrency:
    group: typecheck-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    typecheck:
        if: ${{ github.actor != 'dependabot[bot]' }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                typecheck-commands:
                    - 'npm run typecheck'

        steps:

            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  cache: npm
                  node-version-file: .nvmrc

            - name: Install dependencies
              run: npm install

            - name: Run typecheck command
              run: ${{ matrix.typecheck-commands }}
